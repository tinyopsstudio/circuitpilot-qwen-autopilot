name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Run tests and safety benchmark
        run: npm run check
      - name: Verify Function Compute manifest
        if: matrix.node-version == 20
        env:
          DASHSCOPE_API_KEY: ci-manifest-verification-placeholder
        run: npx --yes @serverless-devs/s@3.1.10 verify -t s.yaml
